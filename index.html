<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا</title>
    <style>
        :root {
            --bg-color: #040d06; 
            --accent-gold: #d4af37;
            --white: #f0f4f0;
        }

        body, html {
            height: 100%; margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* شاشة البداية */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex; align-items: center; justify-content: center;
            z-index: 20; transition: opacity 0.6s ease;
        }

        /* الصفحة الرئيسية */
        #main-content {
            display: none; position: relative; width: 100%; height: 100vh;
            opacity: 0; transition: opacity 0.8s ease;
        }

        /* جعل الصورة بطول وعرض الشاشة كلها */
        .hero-image {
            width: 100%; height: 100%;
            object-fit: cover; /* عشان الصورة تملا الشاشة من غير ما تتمط */
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        /* حاوية الزرار فوق الصورة */
        .button-container {
            position: absolute; bottom: 10%; left: 50%;
            transform: translateX(-50%); z-index: 10;
            width: 100%; text-align: center;
        }

        .btn {
            padding: 18px 45px; font-size: 1.2rem; font-weight: bold;
            border: none; border-radius: 50px; cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            text-decoration: none; display: inline-block;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .btn-gold { background-color: var(--accent-gold); color: #000; }
        .btn-gold:hover { transform: scale(1.05); background-color: #f1c40f; }

        .btn-whatsapp {
            background-color: #25d366; color: white;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
        }
        .btn-whatsapp:hover { transform: scale(1.1); background-color: #1ebe57; }
    </style>
</head>
<body>

    <!-- الشاشة الأولى: اضغط هنا -->
    <div id="splash-screen">
        <button class="btn btn-gold" onclick="showContent()">إضغط هنا</button>
    </div>

    <!-- الشاشة الثانية: الصورة الكاملة وزرار الواتساب -->
    <div id="main-content">
        <!-- حط رابط صورتك هنا -->
        <img src="رابط_الصورة_هنا" alt="Background" class="hero-image">
        
        <div class="button-container">
            <a href="https://wa.me/201125240606?utm_source=chatgpt.com" target="_blank" class="btn btn-whatsapp">
                دوس هنا علشان نعمل واحد
            </a>
        </div>
    </div>

    <script>
        function showContent() {
            const splash = document.getElementById('splash-screen');
            const content = document.getElementById('main-content');

            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                content.style.display = 'block';
                setTimeout(() => {
                    content.style.opacity = '1';
                }, 50);
            }, 600);
        }
    </script>
</body>
</html>
