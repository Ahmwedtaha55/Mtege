<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي المتكامل</title>
    <style>
        /* تنسيقات عامة */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        .page {
            display: none; /* إخفاء كل الصفحات افتراضياً */
            height: 100vh;
            width: 100%;
            text-align: center;
        }

        .active {
            display: block; /* إظهار الصفحة النشطة فقط */
        }

        /* تنسيق الصفحة الأولى */
        #page1 {
            background-image: url('https://i.postimg.cc/507gmG2X/IMG-0994.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: none; 
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 60px;
        }
        
        #page1.active { display: flex; }

        /* تنسيق الصفحة الثانية */
        #page2 {
            padding-top: 20px;
            background-color: #fff;
        }

        #page2 img {
            max-width: 90%;
            max-height: 70vh;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* تنسيق الأزرار */
        .btn {
            background-color: #007bff;
            color: white;
            padding: 15px 35px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, background-color 0.2s;
            margin: 10px;
        }

        .btn:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }

        .btn-whatsapp {
            background-color: #25D366;
        }

        .btn-whatsapp:hover {
            background-color: #1ebe57;
        }

        /* الصفحة الثالثة */
        #page3 {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
        }
        #page3.active { display: flex; }

    </style>
</head>
<body>

    <!-- الصفحة الأولى -->
    <div id="page1" class="page active">
        <button class="btn" onclick="showPage('page2')">اضغط التالي</button>
    </div>

    <!-- الصفحة الثانية -->
    <div id="page2" class="page">
        <img src="https://i.postimg.cc/xCx5P71k/IMG-0993.jpg" alt="صورة الصفحة الثانية">
        <br><br>
        <a href="https://wa.me/201125240606" class="btn btn-whatsapp">دوس هنا علشان تعمل واحد</a>
        <br><br>
        <button class="btn" onclick="showPage('page3')">التالي</button>
    </div>

    <!-- الصفحة الثالثة -->
    <div id="page3" class="page">
        <h1>تم بنجاح!</h1>
        <p>شكراً لزيارتك لموقعنا.</p>
        <button class="btn" onclick="showPage('page1')">العودة للبداية</button>
    </div>

    <script>
        // وظيفة التنقل بين الصفحات
        function showPage(pageId) {
            // إخفاء جميع الصفحات
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => {
                page.classList.remove('active');
            });

            // إظهار الصفحة المطلوبة فقط
            document.getElementById(pageId).classList.add('active');
            
            // التمرير لأعلى الصفحة تلقائياً
            window.scrollTo(0, 0);
        }
    </script>

</body>
</html>
