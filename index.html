<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الأسئلة</title>
    <style>
        body { background-color: #0b1a10; color: #d4af37; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card-container { width: 300px; height: 450px; border: 2px solid #d4af37; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.5); background: #000; display: flex; align-items: center; justify-content: center; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; }
        button { margin-top: 30px; padding: 15px 30px; font-size: 18px; cursor: pointer; background: #d4af37; color: #000; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #f1c40f; }
    </style>
</head>
<body>

    <div class="card-container">
        <img id="cardImage" src="رابط_صورة_البداية_هنا" alt="Card">
    </div>

    <button onclick="nextCard()">سؤال عشوائي</button>

    <script>
        // حط هنا روابط الصور اللي رفعتها
        const images = [
            "رابط_الصورة_1",
            "رابط_الصورة_2",
            "رابط_الصورة_3"
        ];

        function nextCard() {
            const randomIndex = Math.floor(Math.random() * images.length);
            document.getElementById('cardImage').src = images[randomIndex];
        }
    </script>
</body>
</html>
