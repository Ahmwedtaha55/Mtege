<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا</title>
    <style>
        /* ستايل الألوان الفخم اللي بتفضله */
        :root {
            --bg-color: #040d06; /* أخضر داكن مائل للأسود */
            --accent-gold: #d4af37; /* ذهبي */
            --white: #f0f4f0;
        }

        body, html {
            height: 100%; margin: 0;
            background-color: var(--bg-color);
            color: var(--white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* شاشة البداية */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex; align-items: center; justify-content: center;
            z-index: 10; transition: opacity 0.6s ease;
        }

        /* الصفحة الرئيسية (مخفية في البداية) */
        #main-content {
            display: none; flex-direction: column; align-items: center;
            text-align: center; width: 90%; max-width: 400px;
            opacity: 0; transition: opacity 0.8s ease;
        }

        .hero-image {
            width: 100%; border-radius: 20px;
            margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* ستايل الأزرار */
        .btn {
            padding: 15px 40px; font-size: 1.1rem; font-weight: bold;
            border: none; border-radius: 50px; cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            text-decoration: none; display: inline-block;
        }

        .btn-gold { background-color: var(--accent-gold); color: #000; }
        .btn-gold:hover { transform: scale(1.05); background-color: #f1c40f; }

        .btn-whatsapp {
            background-color: #25d366; color: white;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }
        .btn-whatsapp:hover { transform: scale(1.05); background-color: #1ebe57; }
    </style>
</head>
<body>

    <!-- الشاشة الأولى: اضغط هنا -->
    <div id="splash-screen">
        <button class="btn btn-gold" onclick="showContent()">إضغط هنا</button>
    </div>

    <!-- الشاشة الثانية: الصورة وزرار الواتساب -->
    <div id="main-content">
        <img src="رابط_الصورة_هنا" alt="Welcome" class="hero-image">
        
        <!-- استبدل الرقم برقمك (بدون أصفار أو علامة + في البداية) -->
        <a href="https://wa.me/201234567890" target="_blank" class="btn btn-whatsapp">
            تواصل عبر واتساب
        </a>
    </div>

    <script>
        function showContent() {
            const splash = document.getElementById('splash-screen');
            const content = document.getElementById('main-content');

            // إخفاء الشاشة الأولى
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                
                // إظهار المحتوى الرئيسي
                content.style.display = 'flex';
                setTimeout(() => {
                    content.style.opacity = '1';
                }, 50);
            }, 600);
        }
    </script>
</body>
</html>
